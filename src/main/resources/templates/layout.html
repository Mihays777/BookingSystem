<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title th:text="${title} ?: 'Гостиница — Бронирование номеров'">Гостиница</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Пользовательские стили -->
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        /* Небольшие inline-стили для уверенности, что шрифт применяется */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafbfc;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">
            <i class="bi bi-building-fill me-2"></i>Гостиница
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item" sec:authorize="hasAuthority('CLIENT')">
                    <a class="nav-link px-3" th:href="@{/rooms}">
                        <i class="bi bi-house-door me-1"></i> Номера
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('CLIENT')">
                    <a class="nav-link px-3 position-relative" th:href="@{/rooms/requests}">
                        <i class="bi bi-calendar-check me-1"></i> Мои заявки
                        <span th:if="${unreadClientNotifications > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-circle bg-danger badge-notification"
                              th:text="${unreadClientNotifications}"></span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                    <a class="nav-link px-3" th:href="@{/admin/rooms}">
                        <i class="bi bi-gear me-1"></i> Управление номерами
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                    <a class="nav-link px-3 position-relative" th:href="@{/admin/requests}">
                        <i class="bi bi-envelope-paper me-1"></i> Запросы на бронь
                        <span th:if="${pendingAdminRequests + unreadAdminNotifications > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-circle bg-danger badge-notification"
                              th:text="${pendingAdminRequests + unreadAdminNotifications}"></span>
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name"></span>
                        <span class="badge bg-light text-dark ms-1" sec:authentication="principal.authorities"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right me-2"></i>Выйти
                        </a></li>
                    </ul>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link px-3" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Войти
                    </a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-primary rounded-pill px-4 ms-2" th:href="@{/register}">
                        Регистрация
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Основной контент -->
<main class="flex-grow-1 py-4">
    <div class="container">
        <!-- Сообщения -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 rounded-3" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 rounded-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Содержимое страницы -->
        <div layout:fragment="content">
            <!-- Здесь будет контент из дочерних шаблонов -->
        </div>
    </div>
</main>

<!-- Футер -->
<footer class="bg-white py-4 mt-auto border-top">
    <div class="container text-center text-muted">
        <small>&copy; 2025 Гостиница. Все права защищены.</small>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
