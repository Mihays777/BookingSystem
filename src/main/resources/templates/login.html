<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-light" style="height: 100vh;display: flex;align-items: center;">
<div class="container" style="max-width: 400px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>Вход в систему</h3>
        </div>
        <div class="card-body">
            <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль</div>
            <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы</div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Логин</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
            <div class="mt-3 text-center">
                <a th:href="@{/register}">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
