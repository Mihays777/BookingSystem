<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Управление номерами — Администратор</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex flex-wrap align-items-center justify-content-between mb-4">
        <h1 class="h2 mb-0">
            <i class="bi bi-building me-2 text-primary"></i>Управление номерами
        </h1>
        <a th:href="@{/admin/rooms/new}" class="btn btn-primary rounded-pill px-4 mt-2 mt-sm-0">
            <i class="bi bi-plus-lg me-2"></i>Добавить номер
        </a>
    </div>

    <!-- Статистика -->
    <div class="row g-3 mb-4">
        <div class="col-sm-6 col-md-3">
            <div class="card bg-white border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-primary bg-opacity-10 p-3 rounded-3">
                        <i class="bi bi-door-open fs-3 text-primary"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="text-muted mb-1">Всего номеров</h6>
                        <h4 class="mb-0" th:text="${rooms.size()}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card bg-white border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-success bg-opacity-10 p-3 rounded-3">
                        <i class="bi bi-check-circle fs-3 text-success"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="text-muted mb-1">Активных</h6>
                        <h4 class="mb-0" th:text="${activeCount}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card bg-white border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-secondary bg-opacity-10 p-3 rounded-3">
                        <i class="bi bi-eye-slash fs-3 text-secondary"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="text-muted mb-1">Неактивных</h6>
                        <h4 class="mb-0" th:text="${inactiveCount}">0</h4>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-md-3">
            <div class="card bg-white border-0 shadow-sm">
                <div class="card-body d-flex align-items-center">
                    <div class="flex-shrink-0 bg-info bg-opacity-10 p-3 rounded-3">
                        <i class="bi bi-cash-stack fs-3 text-info"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="text-muted mb-1">Средняя цена</h6>
                        <h4 class="mb-0" th:text="${#numbers.formatDecimal(avgPrice, 0, 'COMMA', 2, 'POINT')} + '⠀₽'">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица номеров -->
    <div class="table-responsive mt-3">
        <table class="table mb-0">
            <thead>
            <tr>
                <th>ID</th>
                <th>Фото</th>
                <th>№</th>
                <th>Тип</th>
                <th>Мест</th>
                <th style="text-align: left;">Описание</th>
                <th>Цена</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="room : ${rooms}">
                <td class="fw-bold" th:text="${room.id}"></td>
                <td>
                    <img th:src="${room.photoPath}" class="rounded-3" style="width: 80px; height: 60px; object-fit: cover;">
                </td>
                <td th:text="${room.roomNumber}"></td>
                <td th:text="${room.roomType}"></td>
                <td th:text="${room.capacity}"></td>
                <td style="text-align: left;">
                    <div class="fw-semibold">Номер №<span th:text="${room.id}"></span></div>
                    <small class="text-muted" th:text="${room.description}"></small>
                </td>
                <td class="fw-bold text-primary" th:text="${room.price} + '⠀₽'"></td>
                <td>
                    <span th:class="'badge ' + (${room.active} ? 'bg-success' : 'bg-secondary')"
                          th:text="${room.active} ? 'Активен' : 'Неактивен'"></span>
                </td>
                <td>
                    <div class="btn-group btn-group-sm" role="group">
                        <a th:href="@{/admin/rooms/{id}/edit(id=${room.id})}"
                           class="btn btn-outline-primary" title="Редактировать">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/admin/rooms/{id}/delete(id=${room.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger"
                                    onclick="return confirm('Вы уверены, что хотите удалить номер №'+${room.id}+'?')"
                                    title="Удалить">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${rooms.empty}">
                <td colspan="9" class="text-center py-5 text-muted">
                    <i class="bi bi-building-add fs-1"></i>
                    <p class="mt-2">Нет ни одного номера. Добавьте первый номер.</p>
                    <a th:href="@{/admin/rooms/new}" class="btn btn-sm btn-primary">Добавить номер</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
