<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>Подтверждение оплаты — Гостиница</title>
</head>
<body>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card border-0 shadow-lg">
        <div class="card-header bg-white border-0 text-center pt-4 pb-3">
          <i class="bi bi-credit-card-2-front display-4 text-primary"></i>
          <h2 class="mt-2 fw-bold">Подтверждение оплаты</h2>
          <p class="text-muted">Оплатите бронирование в течение 24 часов</p>
        </div>
        <div class="card-body p-4">
          <div class="bg-light p-4 rounded-4 mb-4">
            <h5 class="fw-bold mb-3">Детали бронирования</h5>
            <div class="d-flex justify-content-between mb-2">
              <span>Номер:</span>
              <strong><span th:text="${request.room.roomNumber}"></span></strong>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Дата заезда:</span>
              <strong th:text="${#temporals.format(request.desiredDate, 'dd MMMM yyyy')}"></strong>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Сумма к оплате:</span>
              <strong class="fs-4 text-primary" th:text="${request.fixedPrice} + ' ₽'"></strong>
            </div>
            <hr>
            <div class="d-flex justify-content-between text-danger">
              <span><i class="bi bi-clock me-1"></i>Оплатить до:</span>
              <strong th:text="${#temporals.format(booking.paymentDeadline, 'dd.MM.yyyy HH:mm')}"></strong>
            </div>
          </div>

          <form th:action="@{/rooms/requests/{id}/pay(id=${request.id})}" method="post">
            <div class="d-grid gap-3">
              <button type="submit" class="btn btn-success btn-lg">
                <i class="bi bi-shield-check me-2"></i>Подтвердить и оплатить
              </button>
              <a th:href="@{/rooms/requests}" class="btn btn-outline-secondary">
                <i class="bi bi-x-circle me-2"></i>Отмена
              </a>
            </div>
          </form>
          <p class="text-muted small text-center mt-4">
            <i class="bi bi-lock me-1"></i>Платеж защищен. Это демо-режим, реальные средства не списываются.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
