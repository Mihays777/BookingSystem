<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>Мои заявки — Гостиница TOP</title>
</head>
<body>
<div layout:fragment="content">
  <h1 class="h2 mb-4">
    <i class="bi bi-list-check me-2 text-primary"></i>Мои заявки на бронирование
  </h1>

  <div th:if="${requests.empty}" class="text-center py-5">
    <i class="bi bi-inbox display-1 text-muted"></i>
    <h3 class="mt-3">У вас пока нет заявок</h3>
    <p class="text-muted">Выберите номер и отправьте запрос на бронирование.</p>
    <a th:href="@{/rooms}" class="btn btn-primary mt-3">
      <i class="bi bi-search me-2"></i>Перейти к номерам
    </a>
  </div>

  <div class="table-responsive" th:if="${!requests.empty}">
    <table class="table text-center">
      <thead>
      <tr>
        <th class="left">Номер</th>
        <th>Дата заезда</th>
        <th>Цена (зафикс.)</th>
        <th>Статус</th>
        <th>Причина отказа</th>
        <th>Действия</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="req : ${requests}"
          th:class="${(req.status.name() == 'APPROVED' or req.status.name() == 'REJECTED') and !req.viewedByClient} ? 'unread-row' : ''">
        <td class="left" data-label="Номер">
          <span class="fw-bold">№<span th:text="${req.room.id}"></span></span>
          <br><small class="text-muted" th:text="${req.room.description}"></small>
        </td>
        <td data-label="Дата заезда" th:text="${#temporals.format(req.desiredDate, 'dd.MM.yyyy')}"></td>
        <td data-label="Цена" class="fw-semibold" th:text="${req.fixedPrice} + ' ₽'"></td>
        <td data-label="Статус">
                        <span th:class="'badge ' + (${req.status.name() == 'PENDING'} ? 'bg-warning' :
                                                     (${req.status.name() == 'APPROVED'} ? 'bg-info' :
                                                     (${req.status.name() == 'PAID'} ? 'bg-success' : 'bg-danger')))"
                              th:text="${req.status}"></span>
        </td>
        <td data-label="Причина отказа" th:text="${req.rejectionReason} ?: '—'"></td>
        <td data-label="Действия">
          <div class="d-flex flex-wrap gap-1 justify-content-center">
            <!-- Кнопка оплаты для APPROVED -->
            <a th:if="${req.status.name() == 'APPROVED'}"
               th:href="@{/rooms/requests/{id}/pay(id=${req.id})}"
               class="btn btn-sm btn-success rounded-pill px-3">
              <i class="bi bi-credit-card me-1"></i>Оплатить
            </a>
            <!-- Кнопка отмены для PENDING и APPROVED -->
            <form th:if="${req.status.name() == 'PENDING' or req.status.name() == 'APPROVED'}"
                  th:action="@{/rooms/requests/{id}/cancel(id=${req.id})}" method="post"
                  onsubmit="return confirm('Вы уверены, что хотите отменить заявку?');">
              <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                <i class="bi bi-x-circle me-1"></i>Отменить
              </button>
            </form>
            <!-- Статус оплачено -->
            <span th:if="${req.status.name() == 'PAID'}" class="badge bg-success py-2 px-3">
            <i class="bi bi-check-lg me-1"></i>Оплачено
        </span>
            <!-- Статус ожидание -->
            <span th:if="${req.status.name() == 'PENDING' and req.status.name() != 'APPROVED'}" class="text-muted small">
            <i class="bi bi-hourglass-split me-1"></i>Ожидание
        </span>
            <!-- Для REJECTED показываем причину -->
            <span th:if="${req.status.name() == 'REJECTED'}" class="text-danger small">
            <i class="bi bi-exclamation-circle me-1"></i><span th:text="${req.rejectionReason}"></span>
        </span>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
